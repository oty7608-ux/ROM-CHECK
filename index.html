<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Smart PT ROM Analyzer Pro</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  
  <style>
    :root { --primary: #3498db; --success: #27ae60; --warning: #e67e22; --danger: #e74c3c; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #000; color: #fff; overflow: hidden; height: 100vh; }
    
    /* 레이아웃 공통 */
    #login_screen, #menu_screen { position: fixed; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; align-items: center; z-index: 100; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom); box-sizing: border-box; overflow-y: auto; }
    #menu_screen { display: none; padding-top: 40px; }

    /* 버튼 스타일 */
    .btn { background: #2c3e50; color: #fff; padding: 16px; margin: 6px 0; border-radius: 12px; border: none; font-size: 1rem; width: 100%; max-width: 400px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn:active { transform: scale(0.98); opacity: 0.8; }
    #history_btn { background: var(--success); display: none; margin-bottom: 20px; }
    .category-title { color: #888; font-size: 0.8rem; margin: 20px 0 5px 0; width: 100%; max-width: 400px; text-align: left; text-transform: uppercase; letter-spacing: 1px; }

    /* 측정 화면 */
    #measure_screen { display: none; width: 100vw; height: 100vh; position: relative; }
    canvas { width: 100%; height: 100%; object-fit: cover; }
    
    /* 오버레이 UI */
    #overlay_ui { position: absolute; top: env(safe-area-inset-top); left: 0; width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; }
    #angle_display { font-size: clamp(80px, 20vw, 120px); color: #00ff00; font-weight: 900; text-shadow: 3px 3px 15px #000; line-height: 1; }
    #status_badge { font-size: 22px; font-weight: bold; margin-top: 10px; padding: 6px 18px; border-radius: 30px; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); transition: 0.3s; }
    #rom_ref_box { font-size: 14px; color: #aaa; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 8px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }

    /* 하단 컨트롤 바 */
    #control_bar { position: absolute; bottom: calc(env(safe-area-inset-bottom) + 20px); width: 100%; display: flex; justify-content: center; gap: 12px; padding: 0 20px; box-sizing: border-box; }
    .tool-btn { flex: 1; max-width: 130px; background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 15px; border-radius: 30px; backdrop-filter: blur(15px); font-size: 13px; font-weight: bold; }
    .reset-btn { background: var(--warning); border: none; }

    /* 운동 목록 서랍 */
    #exercise_drawer { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-radius: 30px 30px 0 0; padding: 30px 20px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 200; max-height: 75vh; overflow-y: auto; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
    .video-card { background: #262626; margin-bottom: 15px; padding: 15px; border-radius: 15px; display: flex; align-items: center; border: 1px solid #333; }
    .video-card img { width: 100px; border-radius: 8px; margin-right: 15px; }
    
    /* 기록 리스트 */
    .history-card { background: #222; padding: 15px; margin-bottom: 8px; border-radius: 10px; border-left: 4px solid var(--success); font-size: 14px; }
  </style>
</head>
<body>

  <div id="login_screen">
    <h1 style="margin-top: 100px;">Smart PT ROM Pro</h1>
    <p style="color:#666; margin-bottom:40px;">물리치료 실습용 AI 각도 측정기</p>
    <div id="g_id_onload" data-client_id="534435432285-5p1cs4c0hufivp300eahdnf7fs15i1pa.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
    <div class="g_id_signin" data-type="standard"></div>
    <button class="btn" style="background:#444; margin-top:30px;" onclick="startGuest()">로그인 없이 게스트로 시작</button>
  </div>

  <div id="menu_screen">
    <h2 id="welcome_msg">항목을 선택하세요</h2>
    <button id="history_btn" class="btn" onclick="toggleHistory()">📋 예전 데이터 가져오기</button>
    <div id="history_list_cont" style="display:none; width:100%; max-width:400px; margin-bottom:20px;"></div>

    <div class="category-title">어깨 (Shoulder)</div>
    <button class="btn" onclick="startMeasure('shoulder_fe')">굽힘/폄 (Flex/Ext)</button>
    <button class="btn" onclick="startMeasure('shoulder_abd')">벌림/모음 (Abd/Add)</button>
    <button class="btn" style="background:var(--primary);" onclick="startMeasure('shoulder_horiz')">수평 벌림/모음 (Horiz)</button>

    <div class="category-title">하지 (Lower Extremity)</div>
    <button class="btn" onclick="startMeasure('hip_fe')">고관절 굽힘/폄</button>
    <button class="btn" onclick="startMeasure('hip_abd')">고관절 벌림/모음</button>
    <button class="btn" onclick="startMeasure('knee_fe')">무릎 굽힘/폄</button>
    <button class="btn" onclick="startMeasure('ankle')">발목 배굴/저굴</button>

    <div class="category-title">기타</div>
    <button class="btn" onclick="startMeasure('neck')">목 (Neck)</button>
    <button class="btn" onclick="startMeasure('trunk')">몸통 (Trunk)</button>
  </div>

  <div id="measure_screen">
    <video id="input_video" style="display:none;" playsinline></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="overlay_ui">
      <div id="angle_display">0°</div>
      <div id="status_badge">준비 중...</div>
      <div id="rom_ref_box">Normal: --</div>
    </div>

    <div id="control_bar">
      <button class="tool-btn reset-btn" onclick="resetZero()">📐 영점 리셋</button>
      <button class="tool-btn" onclick="toggleDrawer()">📺 운동 목록</button>
      <button class="tool-btn" onclick="location.reload()">홈으로</button>
    </div>

    <div id="exercise_drawer">
      <div onclick="toggleDrawer()" style="text-align:center; color:var(--primary); font-weight:bold; padding-bottom:20px;">닫기 [X]</div>
      <div id="video_list_cont"></div>
    </div>
  </div>

<script type="module">
  let mode = "";
  let baseAngle = 0;
  let currentRaw = 0;
  let loggedInUser = null;
  
  // 판정 로직 변수
  let lastAngle = 0;
  let lastTime = Date.now();
  let isSettled = false;

  const romLimits = {
    shoulder_fe: 170, shoulder_abd: 170, shoulder_horiz: 40,
    knee_fe: 130, hip_fe: 115, hip_abd: 40, ankle: 15, neck: 40, trunk: 75
  };

  const romRefs = {
    shoulder_fe: "Flex 180° / Ext 60°", shoulder_abd: "Abd 180° / Add 0°", shoulder_horiz: "H-Abd 45° / H-Add 135°",
    knee_fe: "Flex 135° / Ext 0°", hip_fe: "Flex 120° / Ext 20°", hip_abd: "Abd 45°",
    ankle: "DF 20° / PF 50°", neck: "Flex 45°", trunk: "Flex 80°"
  };

  // [로그인 처리]
  window.handleCredentialResponse = (res) => {
    const payload = JSON.parse(atob(res.credential.split('.')[1]));
    loggedInUser = payload.sub;
    document.getElementById('welcome_msg').innerText = `${payload.name}님 실습 중`;
    document.getElementById('history_btn').style.display = 'block';
    startGuest();
  };

  window.startGuest = () => {
    document.getElementById('login_screen').style.display = 'none';
    document.getElementById('menu_screen').style.display = 'flex';
  };

  window.toggleHistory = () => {
    const cont = document.getElementById('history_list_cont');
    if(cont.style.display === 'block') { cont.style.display = 'none'; return; }
    const logs = JSON.parse(localStorage.getItem('rom_logs_' + (loggedInUser || 'guest')) || "[]");
    cont.innerHTML = logs.length ? logs.map(l => `<div class="history-card"><b>${l.date}</b><br>${l.part}: ${l.angle}° (${l.res})</div>`).join('') : "기록이 없습니다.";
    cont.style.display = 'block';
  };

  // [측정 시작]
  window.startMeasure = (part) => {
    mode = part;
    isSettled = false;
    document.getElementById('rom_ref_box').innerText = `Normal: ${romRefs[part]}`;
    document.getElementById('menu_screen').style.display = 'none';
    document.getElementById('measure_screen').style.display = 'block';
    loadVideos(part);
    camera.start();
  };

  window.resetZero = () => { baseAngle = currentRaw; isSettled = false; document.getElementById('status_badge').innerText = "측정 중..."; };
  
  window.toggleDrawer = () => {
    const d = document.getElementById('exercise_drawer');
    d.style.transform = d.style.transform === "translateY(0%)" ? "translateY(100%)" : "translateY(0%)";
  };

  function loadVideos(part) {
    const cont = document.getElementById('video_list_cont');
    const db = {
      shoulder_fe: [{t:"어깨 굴곡 스트레칭", id:"o43PBLeEVCg"}, {t:"어깨 가동성 운동", id:"wlKbstXt5ck"}],
      knee_fe: [{t:"무릎 가동범위 확보", id:"NX2f9Zs9x2Q"}],
      ankle: [{t:"발목 유연성 강화", id:"_6k0ZkG_o3o"}]
    };
    const list = db[part] || db.shoulder_fe;
    cont.innerHTML = list.map(v => `<div class="video-card" onclick="window.open('https://youtu.be/${v.id}')"><img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"><div><strong>${v.t}</strong><br><small style="color:var(--primary)">유튜브에서 보기</small></div></div>`).join('');
  }

  // [고정밀 각도 계산]
  function getPreciseAngle(p1, p2, p3) {
    const v1 = {x: p1.x - p2.x, y: p1.y - p2.y};
    const v2 = {x: p3.x - p2.x, y: p3.y - p2.y};
    const dot = v1.x * v2.x + v1.y * v2.y;
    const mag = Math.sqrt(v1.x**2 + v1.y**2) * Math.sqrt(v2.x**2 + v2.y**2);
    let deg = Math.acos(dot / mag) * (180 / Math.PI);
    return isNaN(deg) ? 0 : Math.round(deg);
  }

  const videoElement = document.getElementById('input_video');
  const canvasCtx = document.getElementById('output_canvas').getContext('2d');
  
  const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
  pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
  
  pose.onResults((results) => {
    const canvas = document.getElementById('output_canvas');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    
    if (results.poseLandmarks) {
      const lm = results.poseLandmarks;
      const isR = lm[12].visibility > lm[11].visibility;
      let p1, p2, p3;

      // 부위별 포인트 매칭
      if(mode.includes('shoulder_fe')){ p1=isR?lm[24]:lm[23]; p2=isR?lm[12]:lm[11]; p3=isR?lm[14]:lm[13]; }
      else if(mode==='shoulder_abd'){ p1=isR?lm[11]:lm[12]; p2=isR?lm[12]:lm[11]; p3=isR?lm[14]:lm[13]; }
      else if(mode==='shoulder_horiz'){ p1=isR?lm[11]:lm[12]; p2=isR?lm[12]:lm[11]; p3=isR?lm[14]:lm[13]; }
      else if(mode.includes('knee')){ p1=isR?lm[24]:lm[23]; p2=isR?lm[26]:lm[25]; p3=isR?lm[28]:lm[27]; }
      else if(mode==='hip_fe'){ p1=isR?lm[12]:lm[11]; p2=isR?lm[24]:lm[23]; p3=isR?lm[26]:lm[25]; }
      else if(mode==='hip_abd'){ p1=isR?lm[23]:lm[24]; p2=isR?lm[24]:lm[23]; p3=isR?lm[26]:lm[25]; }
      else if(mode==='ankle'){ p1=isR?lm[26]:lm[25]; p2=isR?lm[28]:lm[27]; p3=isR?lm[32]:lm[31]; }
      else if(mode==='neck'){ p1=lm[12]; p2=lm[8]; p3=lm[7]; }
      else { p1=isR?lm[24]:lm[23]; p2=isR?lm[12]:lm[11]; p3=isR?lm[14]:lm[13]; }
      
      currentRaw = getPreciseAngle(p1, p2, p3);
      let displayAngle = Math.abs(currentRaw - baseAngle);
      
      // 180도 이상 반전 방지 로직 (수평 모음 등 대응)
      if(displayAngle > 200) displayAngle = 360 - displayAngle;
      document.getElementById('angle_display').innerText = `${displayAngle}°`;

      // [자동 판정 로직]
      if (Math.abs(displayAngle - lastAngle) < 2) {
        if (Date.now() - lastTime > 1200 && displayAngle > 10 && !isSettled) {
          isSettled = true;
          const isNormal = displayAngle >= (romLimits[mode] || 150);
          const badge = document.getElementById('status_badge');
          badge.innerText = isNormal ? "✅ 정상 (Normal)" : "⚠️ 제한됨 (Limited)";
          badge.style.color = isNormal ? "#00ff00" : "#ff4444";
          badge.style.background = "rgba(0,0,0,0.8)";
          
          // 결과 저장
          const logs = JSON.parse(localStorage.getItem('rom_logs_' + (loggedInUser || 'guest')) || "[]");
          logs.unshift({date: new Date().toLocaleString('ko-KR'), part: mode.toUpperCase(), angle: displayAngle, res: isNormal?"Normal":"Limited"});
          localStorage.setItem('rom_logs_' + (loggedInUser || 'guest'), JSON.stringify(logs.slice(0,10)));
        }
      } else {
        lastAngle = displayAngle;
        lastTime = Date.now();
        if(!isSettled) {
            document.getElementById('status_badge').innerText = "측정 중...";
            document.getElementById('status_badge').style.color = "#fff";
        }
      }

      // 점선 시각화
      canvasCtx.setLineDash([8, 8]); canvasCtx.strokeStyle = "rgba(255, 255, 255, 0.6)"; canvasCtx.lineWidth = 4;
      canvasCtx.beginPath(); canvasCtx.moveTo(p1.x*canvas.width, p1.y*canvas.height);
      canvasCtx.lineTo(p2.x*canvas.width, p2.y*canvas.height);
      canvasCtx.lineTo(p3.x*canvas.width, p3.y*canvas.height); canvasCtx.stroke();
    }
    canvasCtx.restore();
  });

  const camera = new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, facingMode: 'environment', width: 1280, height: 720 });
</script>
</body>
</html>
