<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Smart PT ROM Analyzer Pro</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  
  <style>
    /* 모든 스마트폰 대응 반응형 디자인 */
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #000; color: #fff; overflow: hidden; height: 100vh; }
    #login_screen, #menu_screen { position: fixed; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom); box-sizing: border-box; }
    #menu_screen { display: none; overflow-y: auto; justify-content: flex-start; padding-top: env(safe-area-inset-top); }
    
    .btn { background: #34495e; color: #fff; padding: 16px; margin: 6px; border-radius: 12px; border: none; font-size: 1rem; width: 100%; max-width: 380px; font-weight: 600; cursor: pointer; }
    .category-title { color: #888; font-size: 0.85rem; margin: 15px 0 5px 0; width: 100%; max-width: 380px; text-align: left; }

    /* 측정 화면 레이아웃 */
    #measure_screen { display: none; width: 100vw; height: 100vh; position: relative; }
    canvas { width: 100%; height: 100%; object-fit: cover; }
    
    /* 상단 알림창 UI */
    #overlay_ui { position: absolute; top: env(safe-area-inset-top); left: 0; width: 100%; padding: 15px; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; box-sizing: border-box; }
    #angle_display { font-size: clamp(60px, 15vw, 90px); color: #00ff00; font-weight: 800; text-shadow: 2px 2px 10px #000; line-height: 1; }
    #rom_reference { font-size: 14px; color: rgba(255, 255, 255, 0.8); background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 8px; margin-top: 8px; }

    /* 하단 컨트롤 바 */
    #control_bar { position: absolute; bottom: calc(env(safe-area-inset-bottom) + 20px); width: 100%; display: flex; justify-content: center; gap: 10px; padding: 0 15px; box-sizing: border-box; }
    .tool-btn { flex: 1; max-width: 120px; background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 12px; border-radius: 25px; backdrop-filter: blur(10px); font-size: 12px; font-weight: bold; }
    .reset-btn { background: #e67e22; border: none; }

    /* 운동 영상 목록 */
    #exercise_list { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-radius: 25px 25px 0 0; padding: 25px 20px; transform: translateY(100%); transition: 0.3s ease-out; z-index: 200; max-height: 70vh; overflow-y: auto; }
    .video-card { background: #2c2c2c; margin-bottom: 12px; padding: 12px; border-radius: 12px; display: flex; align-items: center; }
    .video-card img { width: 80px; border-radius: 6px; margin-right: 12px; }
    .close-list { display: block; text-align: center; color: #3498db; margin-bottom: 15px; font-weight: bold; }
  </style>
</head>
<body>

  <div id="login_screen">
    <h2>Smart PT ROM Analyzer</h2>
    <div id="g_id_onload" data-client_id="534435432285-5p1cs4c0hufivp300eahdnf7fs15i1pa.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
    <div class="g_id_signin" data-type="standard"></div>
    <button class="btn" style="background:#555; margin-top:20px;" onclick="startGuest()">로그인 없이 시작</button>
  </div>

  <div id="menu_screen">
    <h3 id="welcome_msg" style="margin-bottom:20px;">측정 부위 선택</h3>
    <div class="category-title">상체 및 몸통</div>
    <button class="btn" onclick="startMeasure('neck')">목 (Neck)</button>
    <button class="btn" onclick="startMeasure('shoulder')">어깨 (Shoulder)</button>
    <button class="btn" onclick="startMeasure('trunk')">등/몸통 (Trunk)</button>
    <div class="category-title">팔 및 손</div>
    <button class="btn" onclick="startMeasure('elbow')">팔꿈치/손목 (Elbow/Wrist)</button>
    <div class="category-title">하체</div>
    <button class="btn" onclick="startMeasure('hip')">고관절 (Hip)</button>
    <button class="btn" onclick="startMeasure('knee')">무릎 (Knee)</button>
    <button class="btn" onclick="startMeasure('ankle')">발목 (Ankle)</button>
  </div>

  <div id="measure_screen">
    <video id="input_video" style="display:none;" playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="overlay_ui">
      <div id="angle_display">0°</div>
      <div id="rom_reference">Normal: --</div>
    </div>
    <div id="control_bar">
      <button class="tool-btn reset-btn" onclick="resetZero()">📐 영점 리셋</button>
      <button class="tool-btn" onclick="toggleExerciseList()">📺 운동 목록</button>
      <button class="tool-btn" onclick="location.reload()">홈으로</button>
    </div>
    <div id="exercise_list">
      <span class="close-list" onclick="toggleExerciseList()">닫기 [X]</span>
      <div id="video_items"></div>
    </div>
  </div>

<script type="module">
  let mode = "";
  let baseAngle = 0;
  let currentRawAngle = 0;
  const romData = {
    neck: "Normal: Flex 45° / Ext 45°",
    shoulder: "Normal: Flex 180° / Ext 60°",
    trunk: "Normal: Flex 80° / Ext 30°",
    elbow: "Normal: Flex 150° / Ext 0°",
    hip: "Normal: Flex 120° / Ext 20°",
    knee: "Normal: Flex 135° / Ext 0°",
    ankle: "Normal: DF 20° / PF 50°"
  };

  window.handleCredentialResponse = (res) => { startGuest(); };
  window.startGuest = () => {
    document.getElementById('login_screen').style.display = 'none';
    document.getElementById('menu_screen').style.display = 'flex';
  };

  window.startMeasure = (part) => {
    mode = part;
    document.getElementById('rom_reference').innerText = romData[part];
    document.getElementById('menu_screen').style.display = 'none';
    document.getElementById('measure_screen').style.display = 'block';
    loadVideos(part);
    camera.start();
  };

  window.resetZero = () => { baseAngle = currentRawAngle; };
  window.toggleExerciseList = () => {
    const list = document.getElementById('exercise_list');
    list.style.transform = list.style.transform === "translateY(0%)" ? "translateY(100%)" : "translateY(0%)";
  };

  function loadVideos(part) {
    const items = document.getElementById('video_items');
    const db = {
      shoulder: [{t:"어깨 가동성 훈련", id:"S_8n_k6U2C4"}],
      knee: [{t:"무릎 가동범위 회복", id:"0I7vU0_A9nU"}],
      ankle: [{t:"발목 유연성 운동", id:"_6k0ZkG_o3o"}]
    };
    const list = db[part] || db.shoulder;
    items.innerHTML = list.map(v => `<div class="video-card" onclick="window.open('https://youtu.be/${v.id}')"><img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"><div><strong>${v.t}</strong><br><small>유튜브 앱에서 보기</small></div></div>`).join('');
  }

  const videoElement = document.getElementById('input_video');
  const canvasElement = document.getElementById('output_canvas');
  const canvasCtx = canvasElement.getContext('2d');

  function getAngle(p1, p2, p3) {
    const r = Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x);
    let a = Math.abs(r * 180 / Math.PI);
    return a > 180 ? 360 - a : Math.round(a);
  }

  function onResults(results) {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    if (results.poseLandmarks) {
      const lm = results.poseLandmarks;
      const isR = lm[12].visibility > lm[11].visibility;
      let p1, p2, p3;
      if(mode==='neck'){p1=lm[12];p2=lm[8];p3=lm[7];}
      else if(mode==='shoulder'){p1=isR?lm[24]:lm[23];p2=isR?lm[12]:lm[11];p3=isR?lm[14]:lm[13];}
      else if(mode==='knee'){p1=isR?lm[24]:lm[23];p2=isR?lm[26]:lm[25];p3=isR?lm[28]:lm[27];}
      else if(mode==='hip'){p1=isR?lm[12]:lm[11];p2=isR?lm[24]:lm[23];p3=isR?lm[26]:lm[25];}
      else if(mode==='ankle'){p1=isR?lm[26]:lm[25];p2=isR?lm[28]:lm[27];p3=isR?lm[32]:lm[31];}
      else{p1=isR?lm[24]:lm[23];p2=isR?lm[12]:lm[11];p3=isR?lm[14]:lm[13];}
      currentRawAngle = getAngle(p1, p2, p3);
      document.getElementById('angle_display').innerText = `${Math.abs(currentRawAngle - baseAngle)}°`;
      canvasCtx.setLineDash([5, 5]);
      canvasCtx.strokeStyle = "rgba(255, 255, 255, 0.5)";
      canvasCtx.lineWidth = 2;
      canvasCtx.beginPath();
      canvasCtx.moveTo(p1.x*canvasElement.width, p1.y*canvasElement.height);
      canvasCtx.lineTo(p2.x*canvasElement.width, p2.y*canvasElement.height);
      canvasCtx.lineTo(p3.x*canvasElement.width, p3.y*canvasElement.height);
      canvasCtx.stroke();
    }
    canvasCtx.restore();
  }

  const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
  pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
  pose.onResults(onResults);
  const camera = new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, facingMode: 'environment', width: 1280, height: 720 });
</script>
</body>
</html>
