<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>AI 스마트 PT 매니저</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background-color: #1a1a1a; color: white; overflow-x: hidden; }
    
    /* 1. 로그인 화면 */
    #login_screen { position: fixed; width: 100%; height: 100%; background: #222; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    .google-btn { background: white; color: #444; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; border: none; font-size: 18px; }

    /* 2. 메인 메뉴 화면 */
    #menu_screen { display: none; padding: 50px; text-align: center; }
    .menu-btn { background: #3498db; color: white; padding: 20px 40px; margin: 10px; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; }

    /* 3. 측정 화면 */
    #measure_screen { display: none; position: relative; text-align: center; }
    canvas { width: 90vw; height: auto; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    #angle_overlay { position: absolute; top: 30px; right: 10% ; font-size: 60px; color: #00ff00; font-weight: bold; }
    
    #video_box { margin-top: 20px; width: 90vw; margin-left: auto; margin-right: auto; }
    .back-btn { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.2); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
  </style>
</head>

<body>

  <div id="login_screen">
    <h1>AI 물리치료 측정기</h1>
    <p>본인 확인을 위해 로그인해 주세요</p>
    <button class="google-btn" onclick="showMenu()">Google 계정으로 로그인</button>
  </div>

  <div id="menu_screen">
    <h2>측정하고 싶은 부위를 선택하세요</h2>
    <button class="menu-btn" onclick="startMeasure('shoulder')">어깨 (Shoulder)</button>
    <button class="menu-btn" onclick="startMeasure('knee')">무릎 (Knee)</button>
    <button class="menu-btn" onclick="startMeasure('elbow')">팔꿈치 (Elbow)</button>
  </div>

  <div id="measure_screen">
    <button class="back-btn" onclick="goBack()">↩ 뒤로가기</button>
    <div id="video_container">
      <video id="input_video" style="display:none;"></video>
      <canvas id="output_canvas"></canvas>
      <div id="angle_overlay">0°</div>
    </div>
    <div id="video_box"></div>
  </div>

  <script type="module">
    const loginScreen = document.getElementById('login_screen');
    const menuScreen = document.getElementById('menu_screen');
    const measureScreen = document.getElementById('measure_screen');
    const angleOverlay = document.getElementById('angle_overlay');
    const videoBox = document.getElementById('video_box');
    
    let currentPart = "";
    let videoPlaying = false;

    window.showMenu = () => { loginScreen.style.display = 'none'; menuScreen.style.display = 'block'; };
    window.goBack = () => { location.reload(); };
    window.startMeasure = (part) => {
      currentPart = part;
      menuScreen.style.display = 'none';
      measureScreen.style.display = 'block';
      camera.start();
    };

    function calculateAngle(p1, p2, p3) {
      const radians = Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x);
      let angle = Math.abs(radians * 180.0 / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return Math.round(angle);
    }

    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    function onResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.poseLandmarks) {
        const lm = results.poseLandmarks;
        let angle = 0;
        let partName = "";

        if (currentPart === 'shoulder') {
          angle = calculateAngle(lm[24], lm[12], lm[14]); // 골반-어깨-팔꿈치
          partName = "어깨";
        } else if (currentPart === 'knee') {
          angle = calculateAngle(lm[24], lm[26], lm[28]); // 골반-무릎-발목
          partName = "무릎";
        } else if (currentPart === 'elbow') {
          angle = calculateAngle(lm[12], lm[14], lm[16]); // 어깨-팔꿈치-손목
          partName = "팔꿈치";
        }

        angleOverlay.innerText = `${angle}°`;

        // 분석 로직 (어깨 기준 170도 미만 시 영상 추천)
        if (currentPart === 'shoulder' && angle < 170 && angle > 40) {
          if(!videoPlaying) {
            videoBox.innerHTML = `<h3>⚠️ ${partName} 스트레칭이 필요합니다!</h3><iframe width="100%" height="450" src="https://www.youtube.com/embed/S_8n_k6U2C4?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            videoPlaying = true;
          }
        }

        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 5});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});
      }
      canvasCtx.restore();
    }

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await pose.send({image: videoElement}); },
      width: 1280, height: 720
    });
  </script>
</body>
</html>
