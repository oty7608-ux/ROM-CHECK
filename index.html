<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PT ROM Test Pro</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  
  <style>
    :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); --primary: #00ff00; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }
    
    /* 레이아웃: 모든 폰(아이폰 16 Pro Max 포함) 대응 */
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; z-index: 100; padding: var(--safe-top) 20px var(--safe-bottom); background: #111; }

    /* 화면 1: 메인 */
    #login_screen { justify-content: center; }
    #login_screen h1 { font-size: 2.8rem; font-weight: 900; margin-bottom: 40px; letter-spacing: -2px; }

    /* 화면 2: 메뉴 (목, 몸통 포함 모든 항목) */
    #menu_screen { display: none; overflow-y: auto; padding-top: calc(var(--safe-top) + 20px); }
    #welcome_msg { font-size: 1.6rem; color: var(--primary); font-weight: bold; margin-bottom: 25px; }
    
    .btn { background: #2c3e50; color: #fff; padding: 18px; margin: 6px 0; border-radius: 16px; border: none; font-size: 1.05rem; width: 100%; max-width: 420px; font-weight: 600; cursor: pointer; }
    .category-title { color: #888; font-size: 0.85rem; margin: 20px 0 6px 0; width: 100%; max-width: 420px; text-align: left; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; letter-spacing: 1px; }

    /* 화면 3: 가이드 */
    #guide_modal { position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 300; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    #guide_content { width: 100%; max-width: 380px; text-align: center; background: #1a1a1a; padding: 35px; border-radius: 30px; border: 1px solid #333; }
    
    /* 화면 4: 측정 (오버레이 및 손떨림 보정) */
    #measure_screen { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
    canvas { width: 100%; height: 100%; object-fit: cover; }
    #overlay_ui { position: absolute; top: calc(var(--safe-top) + 15px); right: 20px; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; }
    #angle_display { font-size: 90px; color: var(--primary); font-weight: 900; text-shadow: 2px 2px 25px #000; line-height: 0.8; }
    #status_badge { font-size: 20px; font-weight: bold; margin-top: 15px; padding: 10px 20px; border-radius: 15px; background: rgba(0,0,0,0.85); min-width: 160px; text-align: center; border: 1.5px solid rgba(255,255,255,0.2); }

    #control_bar { position: absolute; bottom: calc(var(--safe-bottom) + 30px); width: 100%; display: flex; justify-content: center; gap: 12px; padding: 0 25px; }
    .tool-btn { flex: 1; max-width: 130px; background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 16px; border-radius: 40px; backdrop-filter: blur(15px); font-size: 14px; font-weight: bold; }
  </style>
</head>
<body>

  <div id="login_screen" class="screen">
    <h1>PT ROM Test</h1>
    <div id="g_id_onload" data-client_id="534435432285-5p1cs4c0hufivp300eahdnf7fs15i1pa.apps.googleusercontent.com" data-callback="onLogin"></div>
    <div class="g_id_signin" data-type="standard"></div>
    <button class="btn" style="background:#444; margin-top:20px;" onclick="showMenu()">Guest Start</button>
  </div>

  <div id="menu_screen" class="screen">
    <h3 id="welcome_msg">환영합니다!</h3>
    
    <div class="category-title">Upper Body & Neck</div>
    <button class="btn" onclick="openGuide('neck')">Neck Flex/Ext</button>
    <button class="btn" onclick="openGuide('shoulder_fe')">Shoulder Flex/Ext</button>
    <button class="btn" onclick="openGuide('shoulder_abd')">Shoulder Abd/Add</button>
    
    <div class="category-title">Trunk & Lower Body</div>
    <button class="btn" style="background:#8e44ad;" onclick="openGuide('trunk')">Trunk Flex/Ext</button>
    <button class="btn" onclick="openGuide('knee_fe')">Knee Flex/Ext</button>
    <button class="btn" onclick="openGuide('ankle')">Ankle DF/PF</button>
    
    <button class="btn" style="background:#555; margin-top:25px;" onclick="location.reload()">Back to Home</button>
  </div>

  <div id="guide_modal">
    <div id="guide_content">
      <h2 style="color:var(--primary); margin-bottom: 20px;">Measurement Guide</h2>
      <div style="width:130px; height:130px; margin: 15px auto; background:#000; border-radius:20px; display:flex; justify-content:center; align-items:center;">
        <svg width="110" height="110" viewBox="0 0 100 100">
          <circle cx="50" cy="20" r="8" fill="white"/>
          <line x1="50" y1="28" x2="50" y2="60" stroke="white" stroke-width="3"/>
          <line id="guide_arm" x1="50" y1="35" x2="80" y2="35" stroke="var(--primary)" stroke-width="5">
            <animateTransform attributeName="transform" type="rotate" from="0 50 35" to="-90 50 35" dur="1.5s" repeatCount="indefinite" />
          </line>
          <line x1="50" y1="60" x2="35" y2="92" stroke="white" stroke-width="3"/>
          <line x1="50" y1="60" x2="65" y2="92" stroke="white" stroke-width="3"/>
        </svg>
      </div>
      <p id="guide_text" style="line-height:1.7; color:#ccc; margin-bottom: 25px; font-size: 1rem;"></p>
      <button class="btn" style="background:#27ae60;" onclick="startMeasure()">측정 시작</button>
    </div>
  </div>

  <div id="measure_screen">
    <video id="v" style="display:none;" playsinline></video>
    <canvas id="c"></canvas>
    <div id="overlay_ui">
      <div id="angle_display">0°</div>
      <div id="status_badge">Measuring...</div>
    </div>
    <div id="control_bar">
      <button class="tool-btn" style="background:#e67e22;" onclick="zero()">📐 Reset</button>
      <button class="tool-btn" onclick="location.reload()">Home</button>
    </div>
  </div>

<script type="module">
  let mode="", base=0, curr=0, lastA=0, lastT=Date.now(), settled=false;
  let alpha = 0.15, filtered = 0; // 손떨림 보정용 필터

  // 로그인 시 이름 로직 없이 "환영합니다!"만 고정
  window.onLogin = (res) => { showMenu(); };
  window.showMenu = () => { 
    document.getElementById('login_screen').style.display='none'; 
    document.getElementById('menu_screen').style.display='flex'; 
    document.getElementById('welcome_msg').innerText = "환영합니다!";
  };

  window.openGuide = (m) => {
    mode = m;
    const txt = document.getElementById('guide_text');
    const refs = {
        neck: "옆모습에서 귀와 어깨를 기준으로<br>고개를 숙이거나 젖히세요.",
        shoulder_fe: "옆으로 서서 팔을 앞으로 올리세요.",
        shoulder_abd: "정면을 보고 팔을 옆으로 벌리세요.",
        trunk: "옆모습에서 허리를 앞으로 굽히세요.",
        knee_fe: "옆으로 누워 무릎을 굽히세요.",
        ankle: "복사뼈 측면에서 발목을 움직이세요."
    };
    txt.innerHTML = refs[m] || "준비 자세를 취해주세요.";
    document.getElementById('guide_modal').style.display = 'flex';
  };

  window.startMeasure = () => {
    document.getElementById('guide_modal').style.display = 'none';
    document.getElementById('menu_screen').style.display = 'none';
    document.getElementById('measure_screen').style.display = 'block';
    camera.start();
  };

  window.zero = () => { base = filtered; settled = false; };

  const v=document.getElementById('v'), c=document.getElementById('c'), ctx=c.getContext('2d');
  const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
  pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

  pose.onResults((res) => {
    c.width = window.innerWidth; c.height = window.innerHeight;
    ctx.save(); ctx.clearRect(0, 0, c.width, c.height); ctx.drawImage(res.image, 0, 0, c.width, c.height);
    if (res.poseLandmarks) {
      const lm = res.poseLandmarks;
      const isR = lm[12].visibility > lm[11].visibility;
      let p1, p2, p3;
      
      // [핵심 로직] 각 모드별 포인트 추적 (목, 몸통 포인트 정밀화)
      if(mode==='neck'){ p1=lm[11]; p2=lm[7]; p3=lm[1]; } 
      else if(mode==='trunk'){ p1=lm[11]; p2=lm[23]; p3=lm[25]; }
      else if(mode.includes('shoulder')){
          if(mode==='shoulder_abd'){p1=isR?lm[11]:lm[12]; p2=isR?lm[12]:lm[11]; p3=isR?lm[14]:lm[13];}
          else{p1=isR?lm[24]:lm[23]; p2=isR?lm[12]:lm[11]; p3=isR?lm[14]:lm[13];}
      } else if(mode==='knee_fe'){p1=isR?lm[24]:lm[23]; p2=isR?lm[26]:lm[25]; p3=isR?lm[28]:lm[27];}
      else if(mode==='ankle'){p1=isR?lm[26]:lm[25]; p2=isR?lm[28]:lm[27]; p3=isR?lm[32]:lm[31];}
      else {p1=isR?lm[24]:lm[23]; p2=isR?lm[12]:lm[11]; p3=isR?lm[14]:lm[13];}

      // 각도 계산 및 보정 필터
      const v1={x:p1.x-p2.x,y:p1.y-p2.y},v2={x:p3.x-p2.x,y:p3.y-p2.y};
      const raw = Math.acos((v1.x*v2.x+v1.y*v2.y)/(Math.sqrt(v1.x**2+v1.y**2)*Math.sqrt(v2.x**2+v2.y**2)))*(180/Math.PI);
      filtered = Math.round(alpha*raw+(1-alpha)*filtered);
      let disp = Math.abs(filtered-base);
      document.getElementById('angle_display').innerText = `${disp}°`;

      // 손떨림 방지 판정 (1.5초 정지 시 확정)
      if (Math.abs(disp-lastA)<3){
        if (Date.now()-lastT>1500 && disp>15 && !settled){
          settled=true;
          const ok=disp>=40; // 판정 임계값
          const b=document.getElementById('status_badge');
          b.innerText=ok?"✅ Normal":"⚠️ Limited";
          b.style.color=ok?"#00ff00":"#ff4444";
        }
      } else { lastA=disp; lastT=Date.now(); if(!settled)document.getElementById('status_badge').innerText="Measuring..."; }
      
      // 스켈레톤 드로잉
      ctx.setLineDash([8,8]);ctx.strokeStyle="white";ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(p1.x*c.width,p1.y*c.height);ctx.lineTo(p2.x*c.width,p2.y*c.height);ctx.lineTo(p3.x*c.width,p3.y*c.height);ctx.stroke();
    }
    ctx.restore();
  });

  const camera = new Camera(v, { onFrame: async() => { await pose.send({image:v}); }, facingMode:'environment', width:1280, height:720 });
</script>
</body>
</html>
