<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart PT ROM Analyzer</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  
  <style>
    body { font-family: sans-serif; margin: 0; background-color: #000; color: #fff; overflow-x: hidden; }
    #login_screen, #menu_screen { position: fixed; width: 100vw; height: 100vh; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; overflow-y: auto; padding: 20px; box-sizing: border-box; }
    #menu_screen { display: none; }
    .btn { background: #34495e; color: #fff; padding: 18px; margin: 6px; border-radius: 12px; border: none; font-size: 1.1rem; width: 100%; max-width: 350px; cursor: pointer; transition: 0.2s; }
    .btn:active { background: #2c3e50; transform: scale(0.98); }
    .category-title { color: #bdc3c7; font-size: 0.9rem; margin: 15px 0 5px 0; width: 100%; max-width: 350px; text-align: left; }
    
    #history_section { width: 100%; max-width: 350px; margin-top: 25px; border-top: 1px solid #444; padding-top: 20px; }
    .history-item { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.85rem; border-left: 4px solid #3498db; }

    #measure_screen { display: none; width: 100vw; height: 100vh; position: relative; }
    canvas { width: 100%; height: 100%; object-fit: cover; }
    #overlay_ui { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; }
    #angle_display { font-size: 70px; color: #00ff00; font-weight: bold; text-shadow: 2px 2px 4px #000; }
    #status_badge { font-size: 22px; padding: 8px 16px; border-radius: 20px; background: rgba(0,0,0,0.7); margin-top: 10px; }
    
    #recommend_video { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); width: 90%; display: none; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 15px; z-index: 10; }
    .back-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 35px; border-radius: 30px; background: #fff; color: #000; border: none; font-weight: bold; z-index: 11; }
  </style>
</head>
<body>

  <div id="login_screen">
    <h2>AI ROM Analyzer</h2>
    <div id="g_id_onload" data-client_id="534435432285-5p1cs4c0hufivp300eahdnf7fs15i1pa.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
    <div class="g_id_signin" data-type="standard"></div>
    <button class="btn" style="background:#7f8c8d; margin-top:15px;" onclick="startGuest()">게스트 모드로 시작</button>
  </div>

  <div id="menu_screen">
    <h3 id="welcome_msg">측정 부위를 선택하세요</h3>
    
    <div class="category-title">상체 및 몸통</div>
    <button class="btn" onclick="startMeasure('neck')">목 (Neck)</button>
    <button class="btn" onclick="startMeasure('shoulder')">어깨 (Shoulder)</button>
    <button class="btn" onclick="startMeasure('trunk')">등/몸통 (Trunk)</button>
    
    <div class="category-title">팔 및 손</div>
    <button class="btn" onclick="startMeasure('elbow')">팔꿈치/손목 (Elbow/Wrist)</button>
    
    <div class="category-title">하체</div>
    <button class="btn" onclick="startMeasure('hip_knee')">고관절/무릎 (Hip/Knee)</button>
    <button class="btn" onclick="startMeasure('ankle')">발목 (Ankle)</button>
    
    <div id="history_section">
      <h4>📋 최근 기록</h4>
      <div id="history_list">기록이 없습니다.</div>
    </div>
  </div>

  <div id="measure_screen">
    <video id="input_video" style="display:none;" playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="overlay_ui">
      <div id="angle_display">0°</div>
      <div id="status_badge">멈춰주세요</div>
    </div>
    <div id="recommend_video"></div>
    <button class="back-btn" onclick="location.reload()">처음으로</button>
  </div>

<script type="module">
  let currentUser = "Guest";
  let mode = "";
  let lastAngle = 0;
  let lastTime = Date.now();
  let isSettled = false;
  let videoPlayed = false;

  window.handleCredentialResponse = (response) => {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    currentUser = payload.sub;
    document.getElementById('welcome_msg').innerText = `${payload.name}님 측정 도구`;
    loadHistory();
    document.getElementById('login_screen').style.display = 'none';
    document.getElementById('menu_screen').style.display = 'flex';
  };

  window.startGuest = () => {
    currentUser = "Guest";
    document.getElementById('login_screen').style.display = 'none';
    document.getElementById('menu_screen').style.display = 'flex';
    document.getElementById('history_section').style.display = "none";
  };

  window.startMeasure = (part) => {
    mode = part;
    document.getElementById('menu_screen').style.display = 'none';
    document.getElementById('measure_screen').style.display = 'block';
    camera.start();
  };

  function getAngle(p1, p2, p3) {
    if(!p1 || !p2 || !p3) return 0;
    const r = Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x);
    let a = Math.abs(r * 180 / Math.PI);
    return a > 180 ? 360 - a : Math.round(a);
  }

  function onResults(results) {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.poseLandmarks) {
      const lm = results.poseLandmarks;
      const isR = lm[12].visibility > lm[11].visibility;
      let p1, p2, p3;

      // 부위별 관절 매칭
      switch(mode) {
        case 'neck': p1 = lm[12]; p2 = lm[8]; p3 = lm[7]; break; // 어깨-귀-반대쪽귀
        case 'shoulder': p1 = isR?lm[24]:lm[23]; p2 = isR?lm[12]:lm[11]; p3 = isR?lm[14]:lm[13]; break;
        case 'trunk': p1 = isR?lm[12]:lm[11]; p2 = isR?lm[24]:lm[23]; p3 = isR?lm[26]:lm[25]; break;
        case 'elbow': p1 = isR?lm[12]:lm[11]; p2 = isR?lm[14]:lm[13]; p3 = isR?lm[16]:lm[15]; break;
        case 'hip_knee': p1 = isR?lm[24]:lm[23]; p2 = isR?lm[26]:lm[25]; p3 = isR?lm[28]:lm[27]; break;
        case 'ankle': p1 = isR?lm[26]:lm[25]; p2 = isR?lm[28]:lm[27]; p3 = isR?lm[32]:lm[31]; break;
      }

      const angle = getAngle(p1, p2, p3);
      document.getElementById('angle_display').innerText = `${angle}°`;

      // 1초 정지 판정
      if (Math.abs(angle - lastAngle) < 2) {
        if (Date.now() - lastTime > 1000 && angle > 20 && !isSettled) {
          isSettled = true;
          handleResult(angle);
        }
      } else {
        lastAngle = angle;
        lastTime = Date.now();
      }

      // 점선 각도기 그리기
      canvasCtx.setLineDash([5, 5]);
      canvasCtx.strokeStyle = "rgba(255, 255, 255, 0.4)";
      canvasCtx.beginPath();
      canvasCtx.moveTo(p1.x*canvasElement.width, p1.y*canvasElement.height);
      canvasCtx.lineTo(p2.x*canvasElement.width, p2.y*canvasElement.height);
      canvasCtx.lineTo(p3.x*canvasElement.width, p3.y*canvasElement.height);
      canvasCtx.stroke();
    }
    canvasCtx.restore();
  }

  function handleResult(angle) {
    let limit = 160; // 기본 임계값
    if(mode === 'ankle') limit = 40;
    
    const isNormal = angle >= limit;
    const statusText = isNormal ? "정상" : "제한됨";
    document.getElementById('status_badge').innerText = `결과: ${statusText}`;
    document.getElementById('status_badge').style.color = isNormal ? "#00ff00" : "#ff4444";

    if (!isNormal && !videoPlayed) {
      const vid = document.getElementById('recommend_video');
      vid.style.display = "block";
      vid.innerHTML = `<iframe width="100%" height="220" src="https://www.youtube.com/embed/S_8n_k6U2C4?autoplay=1" frameborder="0" allow="autoplay" allowfullscreen></iframe>`;
      videoPlayed = true;
    }
  }

  // (이하 생략 - 이전 카메라 및 포즈 설정과 동일)
  const videoElement = document.getElementById('input_video');
  const canvasElement = document.getElementById('output_canvas');
  const canvasCtx = canvasElement.getContext('2d');
  const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
  pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
  pose.onResults(onResults);
  const camera = new Camera(videoElement, {
    onFrame: async () => { await pose.send({image: videoElement}); },
    facingMode: 'environment', width: 1280, height: 720
  });
</script>
</body>
</html>
