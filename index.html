<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>AI 종합 관절 ROM 측정기</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; }
    #video_container { position: relative; display: inline-block; margin-top: 20px; }
    canvas { background-color: #fff; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    
    /* 각도 표시 레이블 스타일 */
    .angle-label {
      position: absolute; font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.6);
      color: white; padding: 5px 10px; border-radius: 5px; pointer-events: none;
    }
    
    #result_panel { max-width: 700px; margin: 20px auto; padding: 20px; background: white; border-radius: 15px; }
    .status-box { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
    .danger { color: #e74c3c; }
    .normal { color: #27ae60; }
  </style>
</head>

<body>
  <h1>AI 종합 관절 측정 시스템</h1>

  <div id="video_container">
    <video id="input_video" style="display:none;"></video>
    <canvas id="output_canvas" width="800" height="600"></canvas>
    
    <div id="shoulder_label" class="angle-label" style="top: 20px; left: 20px;">어깨: 0°</div>
    <div id="elbow_label" class="angle-label" style="top: 60px; left: 20px;">팔꿈치: 0°</div>
    <div id="hip_label" class="angle-label" style="top: 100px; left: 20px;">고관절: 0°</div>
    <div id="knee_label" class="angle-label" style="top: 140px; left: 20px;">무릎: 0°</div>
  </div>

  <div id="result_panel">
    <div id="status_msg" class="status-box">측정하고 싶은 부위를 움직여보세요.</div>
    <div id="video_area"></div>
  </div>

  <script type="module">
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const videoArea = document.getElementById('video_area');
    const statusMsg = document.getElementById('status_msg');

    // 3개 점 사이의 각도를 구하는 함수
    function calculateAngle(p1, p2, p3) {
      const radians = Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x);
      let angle = Math.abs(radians * 180.0 / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return Math.round(angle);
    }

    let currentVideoId = "";
    function showExercise(id, partName) {
      if (currentVideoId !== id) {
        currentVideoId = id;
        statusMsg.innerHTML = `<span class="danger">⚠️ ${partName} 가동범위가 좁습니다. 재활 영상을 추천합니다.</span>`;
        videoArea.innerHTML = `<iframe width="100%" height="315" src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
      }
    }

    function onResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.poseLandmarks) {
        const landmarks = results.poseLandmarks;

        // 오른쪽 부위 점 번호 (12:어깨, 14:팔꿈치, 16:손목, 24:고관절, 26:무릎, 28:발목)
        const shoulder = landmarks[12];
        const elbow = landmarks[14];
        const wrist = landmarks[16];
        const hip = landmarks[24];
        const knee = landmarks[26];
        const ankle = landmarks[28];

        // 1. 어깨 각도 (골반-어깨-팔꿈치)
        const sAngle = calculateAngle(hip, shoulder, elbow);
        document.getElementById('shoulder_label').innerText = `어깨: ${sAngle}°`;

        // 2. 팔꿈치 각도 (어깨-팔꿈치-손목)
        const eAngle = calculateAngle(shoulder, elbow, wrist);
        document.getElementById('elbow_label').innerText = `팔꿈치: ${eAngle}°`;

        // 3. 고관절 각도 (어깨-고관절-무릎)
        const hAngle = calculateAngle(shoulder, hip, knee);
        document.getElementById('hip_label').innerText = `고관절: ${hAngle}°`;

        // 4. 무릎 각도 (고관절-무릎-발목)
        const kAngle = calculateAngle(hip, knee, ankle);
        document.getElementById('knee_label').innerText = `무릎: ${kAngle}°`;

        // 분석 로직 (예시: 어깨가 170도 미만일 때 영상 추천)
        if (sAngle < 150 && sAngle > 40) {
          showExercise("S_8n_k6U2C4", "어깨");
        } else if (kAngle < 140 && kAngle > 40) {
          showExercise("nYpX2vI7Q9Y", "무릎");
        }

        drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
        drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2});
      }
      canvasCtx.restore();
    }

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await pose.send({image: videoElement}); },
      width: 800, height: 600
    });
    camera.start();
  </script>
</body>
</html>
