<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart PT ROM Tracker</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background-color: #000; color: #fff; overflow: hidden; }
    #login_screen, #menu_screen { position: fixed; width: 100vw; height: 100vh; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    #menu_screen { display: none; }
    .btn { background: #34495e; color: #fff; padding: 20px; margin: 10px; border-radius: 12px; border: none; font-size: 1.2rem; cursor: pointer; width: 85%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    
    #measure_screen { display: none; width: 100vw; height: 100vh; position: relative; }
    canvas { width: 100%; height: 100%; object-fit: cover; }
    
    #overlay_ui { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; box-sizing: border-box; pointer-events: none; display: flex; justify-content: space-between; align-items: flex-start; }
    #angle_display { font-size: 90px; color: rgba(0, 255, 0, 0.8); font-weight: bold; text-shadow: 3px 3px 5px #000; }
    #user_info { font-size: 16px; color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; }
    
    .back-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.25); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 15px 40px; border-radius: 30px; cursor: pointer; pointer-events: auto; backdrop-filter: blur(5px); }
  </style>
</head>
<body>

  <div id="login_screen">
    <h2 style="margin-bottom: 30px;">AI ROM Analyzer</h2>
    <div id="g_id_onload"
         data-client_id="534435432285-5p1cs4c0hufivp300eahdnf7fs15i1pa.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="rectangular" data-logo_alignment="left"></div>
    <p style="margin-top: 20px; color: #888; font-size: 0.9rem;">물리치료 실습을 위해 로그인이 필요합니다.</p>
  </div>

  <div id="menu_screen">
    <div id="welcome_msg" style="margin-bottom: 30px; font-size: 1.2rem; font-weight: bold; color: #2ecc71;"></div>
    <h3 style="margin-bottom: 20px; color: #bdc3c7;">측정 부위를 선택하세요</h3>
    <button class="btn" onclick="start('shoulder')">Shoulder Flexion</button>
    <button class="btn" onclick="start('knee') Bryan">Knee Flexion</button>
    <button class="btn" onclick="start('elbow')">Elbow Flexion</button>
  </div>

  <div id="measure_screen">
    <video id="input_video" style="display:none;" playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="overlay_ui">
      <div id="user_info">접속 중...</div>
      <div id="angle_display">0°</div>
    </div>
    <button class="back-btn" onclick="location.reload()">처음으로</button>
  </div>

<script type="module">
  // [1] 구글 로그인 처리
  window.handleCredentialResponse = (response) => {
    const responsePayload = parseJwt(response.credential);
    document.getElementById('welcome_msg').innerText = `반갑습니다, ${responsePayload.name}님!`;
    document.getElementById('user_info').innerText = `측정자: ${responsePayload.name}`;
    
    document.getElementById('login_screen').style.display = 'none';
    document.getElementById('menu_screen').style.display = 'flex';
  };

  function parseJwt(token) {
    var base64Url = token.split('.')[1];
    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(window.atob(base64));
  };

  // [2] 카메라 및 AI 각도 측정 로직
  const videoElement = document.getElementById('input_video');
  const canvasElement = document.getElementById('output_canvas');
  const canvasCtx = canvasElement.getContext('2d');
  let mode = "";

  window.start = (part) => {
    mode = part;
    document.getElementById('menu_screen').style.display = 'none';
    document.getElementById('measure_screen').style.display = 'block';
    camera.start();
  };

  function getAngle(p1, p2, p3) {
    const r = Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x);
    let a = Math.abs(r * 180 / Math.PI);
    return a > 180 ? 360 - a : Math.round(a);
  }

  function onResults(results) {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.poseLandmarks) {
      const lm = results.poseLandmarks;
      let p1, p2, p3; // p2가 각도의 중심(관절)
      
      // 물리치료 측정 기준 (오른쪽 랜드마크 사용)
      if (mode === 'shoulder') { p1 = lm[24]; p2 = lm[12]; p3 = lm[14]; } // 골반-어깨-팔꿈치
      else if (mode === 'knee') { p1 = lm[24]; p2 = lm[26]; p3 = lm[28]; }    // 골반-무릎-발목
      else if (mode === 'elbow') { p1 = lm[12]; p2 = lm[14]; p3 = lm[16]; }   // 어깨-팔꿈치-손목

      if (p1 && p2 && p3) {
        const angle = getAngle(p1, p2, p3);
        document.getElementById('angle_display').innerText = `${angle}°`;

        // 해부학적 자세 기반 희미한 점선 각도기 그리기
        canvasCtx.setLineDash([6, 6]);
        canvasCtx.strokeStyle = "rgba(255, 255, 255, 0.4)";
        canvasCtx.lineWidth = 2;
        canvasCtx.beginPath();
        canvasCtx.moveTo(p1.x * canvasElement.width, p1.y * canvasElement.height);
        canvasCtx.lineTo(p2.x * canvasElement.width, p2.y * canvasElement.height);
        canvasCtx.lineTo(p3.x * canvasElement.width, p3.y * canvasElement.height);
        canvasCtx.stroke();

        // 관절 위치에 희미한 작은 점 표시
        [p1, p2, p3].forEach(p => {
          canvasCtx.beginPath();
          canvasCtx.arc(p.x * canvasElement.width, p.y * canvasElement.height, 4, 0, 2 * Math.PI);
          canvasCtx.fillStyle = "rgba(46, 204, 113, 0.5)"; // 희미한 녹색
          canvasCtx.fill();
        });
      }
    }
    canvasCtx.restore();
  }

  const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
  pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
  pose.onResults(onResults);

  const camera = new Camera(videoElement, {
    onFrame: async () => { await pose.send({image: videoElement}); },
    facingMode: 'environment', // 무조건 후면 카메라 사용
    width: 1280, height: 720
  });
</script>
</body>
</html>
