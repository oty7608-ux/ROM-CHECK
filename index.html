<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PT ROM Analyzer Pro (All-Device Ready)</title>
  
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  
  <style>
    :root { 
      --safe-top: env(safe-area-inset-top, 20px); 
      --safe-bottom: env(safe-area-inset-bottom, 20px); 
      --primary: #00ff00; 
      --accent: #3498db;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    
    /* [반응형 핵심] 고정 높이가 아닌 유동적 화면 크기 설정 */
    body { font-family: -apple-system, sans-serif; background: #000; color: #fff; overflow: hidden; height: 100dvh; width: 100vw; position: fixed; }
    
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; z-index: 100; padding: var(--safe-top) 5% var(--safe-bottom); background: #111; overflow-y: auto; }
    
    /* 타이틀 및 입력창 */
    .title { font-size: clamp(1.8rem, 8vw, 2.5rem); font-weight: 900; margin-bottom: 30px; letter-spacing: -1px; text-align: center; }
    .input-group { width: 100%; max-width: 450px; margin-bottom: 20px; }
    .input-group label { font-size: 0.8rem; color: #888; display: block; margin-bottom: 8px; }
    .height-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #222; color: #fff; font-size: 1rem; }

    /* 버튼 스타일 (반응형 너비) */
    .btn { background: #2c3e50; color: #fff; padding: clamp(14px, 4vh, 20px); margin: 6px 0; border-radius: 15px; border: none; font-size: 1rem; width: 100%; max-width: 450px; font-weight: 700; cursor: pointer; }
    .btn:active { opacity: 0.8; transform: scale(0.98); }
    .category-title { color: #888; font-size: 0.75rem; margin: 15px 0 5px 0; width: 100%; max-width: 450px; text-align: left; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; }

    /* 측정 화면 UI */
    #measure_screen { display: none; width: 100vw; height: 100dvh; position: relative; background: #000; padding: 0; }
    canvas { width: 100%; height: 100%; object-fit: cover; }
    #overlay_ui { position: absolute; top: var(--safe-top); right: 5%; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; }
    #angle_display { font-size: clamp(60px, 15vw, 90px); color: var(--primary); font-weight: 900; text-shadow: 2px 2px 20px #000; }
    #status_badge { font-size: 16px; font-weight: bold; margin-top: 10px; padding: 8px 16px; border-radius: 10px; background: rgba(0,0,0,0.8); min-width: 130px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }

    /* 하단 도구 바 (반응형 배치) */
    #control_bar { position: absolute; bottom: calc(var(--safe-bottom) + 10px); width: 100%; display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; padding: 0 10px; }
    .tool-btn { flex: 1 1 20%; max-width: 100px; background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 12px 5px; border-radius: 20px; backdrop-filter: blur(10px); font-size: 11px; font-weight: bold; }

    /* 운동 목록 서랍 */
    #drawer { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-radius: 25px 25px 0 0; padding: 25px 20px var(--safe-bottom); transform: translateY(100%); transition: 0.4s; z-index: 200; max-height: 70vh; overflow-y: auto; }
    .v-card { background: #262626; margin-bottom: 12px; padding: 12px; border-radius: 12px; display: flex; align-items: center; border: 1px solid #333; }
    .v-card img { width: 70px; border-radius: 6px; margin-right: 15px; }
  </style>
</head>
<body>

  <div id="login_screen" class="screen" style="justify-content: center;">
    <h1 class="title">PT ROM Test</h1>
    <div id="g_id_onload" data-client_id="534435432285-5p1cs4c0hufivp300eahdnf7fs15i1pa.apps.googleusercontent.com" data-callback="onLogin"></div>
    <div class="g_id_signin" data-type="standard" data-shape="rectangular"></div>
    <button class="btn" style="background:#444; margin-top:20px;" onclick="showMenu()">Guest Start</button>
  </div>

  <div id="menu_screen" class="screen">
    <h3 style="color:var(--primary); font-size: 1.5rem; margin-bottom: 20px;">환영합니다!</h3>
    
    <div class="input-group">
      <label>측정자 키 입력 (cm) - 시차 오차 보정용</label>
      <input type="number" id="user_height" class="height-input" value="175">
    </div>

    <div class="category-title">Upper Body & Spine</div>
    <button class="btn" onclick="run('neck')">Neck Flex/Ext</button>
    <button class="btn" onclick="run('trunk')">Trunk Flex/Ext</button>
    <button class="btn" onclick="run('shoulder_fe')">Shoulder Flex/Ext</button>
    <button class="btn" onclick="run('shoulder_abd')">Shoulder Abd/Add</button>
    <button class="btn" onclick="run('shoulder_horiz')">Shoulder Horizontal</button>

    <div class="category-title">Lower Body</div>
    <button class="btn" onclick="run('knee_fe')">Knee Flex/Ext</button>
    <button class="btn" onclick="run('hip_fe')">Hip Flex/Ext</button>
    <button class="btn" onclick="run('ankle')">Ankle DF/PF</button>
    
    <button class="btn" style="background:#555; margin-top:30px;" onclick="location.reload()">Reset App</button>
  </div>

  <div id="measure_screen">
    <video id="v" style="display:none;" playsinline></video>
    <canvas id="c"></canvas>
    
    <div id="overlay_ui">
      <div id="angle_display">0°</div>
      <div id="status_badge">Measuring...</div>
      <div id="rom_ref" style="font-size:12px; color:#aaa; margin-top:5px;">Normal: --</div>
    </div>

    <div id="control_bar">
      <button class="tool-btn" style="background:#e67e22;" onclick="zero()">📐 Reset</button>
      <button class="tool-btn" onclick="switchCam()">🔄 전환</button>
      <button class="tool-btn" onclick="toggleDrawer()">📺 운동</button>
      <button class="tool-btn" onclick="location.reload()">Home</button>
    </div>

    <div id="drawer">
        <div onclick="toggleDrawer()" style="text-align:center; color:var(--primary); font-weight:bold; padding-bottom:20px;">닫기 [X]</div>
        <div id="v_list"></div>
    </div>
  </div>

<script type="module">
  let mode="", base=0, curr=0, lastA=0, lastT=Date.now(), settled=false;
  let alpha = 0.15, filtered = 0, isFront = false;

  window.onLogin = (res) => { showMenu(); };
  window.showMenu = () => { 
    document.getElementById('login_screen').style.display='none'; 
    document.getElementById('menu_screen').style.display='flex'; 
  };

  window.run = (m) => {
    mode=m; settled=false; filtered=0;
    document.getElementById('menu_screen').style.display='none';
    document.getElementById('measure_screen').style.display='block';
    const refs = { neck: "45°", trunk: "80°", shoulder_fe: "180°", shoulder_abd: "180°", shoulder_horiz: "Add 135°", knee_fe: "135°", ankle: "20°", hip_fe: "120°" };
    document.getElementById('rom_ref').innerText = `Normal: ${refs[m] || '--'}`;
    loadVideos(m);
    startCamera();
  };

  window.switchCam = () => { isFront = !isFront; startCamera(); };
  window.zero = () => { base = filtered; settled = false; document.getElementById('status_badge').innerText="Measuring..."; };
  window.toggleDrawer = () => {
    const d = document.getElementById('drawer');
    d.style.transform = d.style.transform === "translateY(0%)" ? "translateY(100%)" : "translateY(0%)";
  };

  function loadVideos(m) {
    const cont = document.getElementById('v_list');
    const db = { shoulder_fe: [{t:"어깨 굴곡 스트레칭", id:"o43PBLeEVCg"}], knee_fe: [{t:"무릎 가동성 확보", id:"NX2f9Zs9x2Q"}] };
    const list = db[m] || db.shoulder_fe;
    cont.innerHTML = list.map(v => `<div class="v-card" onclick="window.open('https://youtu.be/${v.id}')"><img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"><div><strong>${v.t}</strong><br><small>유튜브 열기</small></div></div>`).join('');
  }

  const v=document.getElementById('v'), c=document.getElementById('c'), ctx=c.getContext('2d');
  const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
  pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

  pose.onResults((res) => {
    c.width = window.innerWidth; c.height = window.innerHeight;
    ctx.save(); ctx.clearRect(0,0,c.width,c.height);
    if(isFront) { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
    ctx.drawImage(res.image, 0, 0, c.width, c.height);
    
    if (res.poseLandmarks) {
      const lm = res.poseLandmarks;
      const isR = lm[12].visibility > lm[11].visibility;
      let p1, p2, p3;

      // 포인트 로직 복구 (목/몸통 포함)
      if(mode==='neck'){ p1=lm[11]; p2=lm[7]; p3=lm[1]; }
      else if(mode==='trunk'){ p1=lm[11]; p2=lm[23]; p3=lm[25]; }
      else if(mode.includes('shoulder')){
          if(mode==='shoulder_abd'||mode==='shoulder_horiz'){ p1=isR?lm[11]:lm[12]; p2=isR?lm[12]:lm[11]; p3=isR?lm[14]:lm[13]; }
          else { p1=isR?lm[24]:lm[23]; p2=isR?lm[12]:lm[11]; p3=isR?lm[14]:lm[13]; }
      } else if(mode==='knee_fe'){ p1=isR?lm[24]:lm[23]; p2=isR?lm[26]:lm[25]; p3=isR?lm[28]:lm[27]; }
      else if(mode==='hip_fe'){ p1=isR?lm[12]:lm[11]; p2=isR?lm[24]:lm[23]; p3=isR?lm[26]:lm[25]; }
      else if(mode==='ankle'){ p1=isR?lm[26]:lm[25]; p2=isR?lm[28]:lm[27]; p3=isR?lm[32]:lm[31]; }
      else { p1=isR?lm[24]:lm[23]; p2=isR?lm[12]:lm[11]; p3=isR?lm[14]:lm[13]; }

      const v1={x:p1.x-p2.x,y:p1.y-p2.y}, v2={x:p3.x-p2.x,y:p3.y-p2.y};
      const raw = Math.acos((v1.x*v2.x+v1.y*v2.y)/(Math.sqrt(v1.x**2+v1.y**2)*Math.sqrt(v2.x**2+v2.y**2)))*(180/Math.PI);
      
      // 키 보정 계수
      const userH = parseFloat(document.getElementById('user_height').value) || 170;
      const corr = (userH - 170) * 0.04;
      
      filtered = Math.round(alpha*(raw + corr)+(1-alpha)*filtered);
      let disp = Math.abs(filtered-base);
      document.getElementById('angle_display').innerText = `${disp}°`;

      if (Math.abs(disp-lastA)<3){
        if (Date.now()-lastT>1500 && disp>15 && !settled){
          settled=true;
          document.getElementById('status_badge').innerText = disp>=45?"✅ Normal":"⚠️ Limited";
        }
      } else { lastA=disp; lastT=Date.now(); if(!settled)document.getElementById('status_badge').innerText="Measuring..."; }
      
      ctx.setLineDash([8,8]); ctx.strokeStyle="white"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(p1.x*c.width,p1.y*c.height); ctx.lineTo(p2.x*c.width,p2.y*c.height); ctx.lineTo(p3.x*c.width,p3.y*c.height); ctx.stroke();
    }
    ctx.restore();
  });

  let camera = null;
  function startCamera() {
    if(camera) camera.stop();
    camera = new Camera(v, { onFrame: async() => { await pose.send({image:v}); }, facingMode: isFront?'user':'environment', width:1280, height:720 });
    camera.start();
  }
</script>
</body>
</html>
